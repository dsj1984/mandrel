name: Triage PR Failure

# Reacts to a completed CI / CD run that failed on a pull_request event.
# Downloads the test-results-* and crap-report-* artifacts the upstream
# workflow already uploads, parses the most relevant signal out of them,
# and posts (or edits) a single marker-keyed comment on the originating
# PR. Keyed by the HTML marker `<!-- ci-triage-comment v1 -->` so re-runs
# edit the existing comment rather than appending duplicates.
#
# The upstream `CI / CD` workflow at .github/workflows/ci.yml is deliberately
# not modified; this listener is purely additive.

on:
  workflow_run:
    workflows: ['CI / CD']
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  triage:
    name: Triage CI failure
    # workflow_run cannot be filtered with a top-level event filter, so the
    # PR-only + failure-only guard lives here. `head_repository.fork == true`
    # runs are tolerated — the comment goes on the upstream PR either way,
    # and no privileged token is exposed to fork code (the script only
    # consumes artifacts the upstream run already produced and posts via
    # GITHUB_TOKEN scoped to pull-requests:write).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download test-results artifacts
        # `pattern` plus `merge-multiple: false` keeps the per-OS folders
        # under <ARTIFACTS_DIR>/test-results-<os>-node-22/ — the parser
        # iterates that layout so a single artifact missing does not lose
        # the other OS's signal.
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download crap-report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: crap-report-*
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR number
        id: pr
        env:
          PR_PAYLOAD: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # workflow_run.pull_requests[0] is the canonical lookup. When the
          # array is empty (rare cross-repo case), fall back to a head-SHA
          # lookup via `gh pr list`.
          NUM=$(echo "$PR_PAYLOAD" | jq -r '.[0].number // empty')
          if [ -z "$NUM" ]; then
            NUM=$(gh pr list \
              --search "$HEAD_SHA" \
              --json number --jq '.[0].number // empty')
          fi
          if [ -z "$NUM" ]; then
            echo "::warning::could not resolve PR number; skipping triage"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Run triage-ci-failure
        if: steps.pr.outputs.pr_number != ''
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          ARTIFACTS_DIR: artifacts
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .agents/scripts/triage-ci-failure.js
