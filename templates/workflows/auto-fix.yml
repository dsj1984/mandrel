name: Auto-fix on CI failure

# Reacts to a completed CI / CD run that failed on a pull_request event.
# When the failure class is `lint` or `format`, runs biome --apply +
# biome format --write (excluding tests/**), commits as the bot identity
# with a `[auto-fix]` subject prefix, and pushes to the PR's head branch.
# When the failure class is anything else (coverage, crap, maintainability,
# test, unknown), posts a marker-keyed bail comment so the operator sees
# the no-op explicitly.
#
# Hard caps (Tech Spec #1237):
#   - Never run twice on the same PR. Tracked via the `auto-fix-attempted`
#     label, which both the fix step and the bail step set.
#   - Never run on fork PRs. `workflow_run.head_repository.fork == true`
#     short-circuits the job so we never check out fork code with a
#     write-scoped token.
#   - Never touch test files. The fix step excludes tests/** from biome
#     and re-asserts via `git diff --name-only` before staging.
#
# Shares its trigger with .github/workflows/triage-pr-failure.yml; both
# listen for the same `workflow_run / completed` event and decide
# independently. The triage workflow always comments; this one only acts
# on a fixable class.

on:
  workflow_run:
    workflows: ['CI / CD']
    types: [completed]

permissions: {}

jobs:
  auto-fix:
    name: Auto-fix lint/format
    # workflow_run cannot be filtered at the top-level `on` block, so the
    # PR-only + failure-only + non-fork guard lives here. The label guard
    # runs as a job step (it needs an API call to read PR labels).
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.fork != true
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_PAYLOAD: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Same resolver as triage-pr-failure: prefer workflow_run.pull_requests[0],
          # fall back to head-SHA search for cross-repo edge cases (which we've
          # already ruled out by the fork guard above, but keep the fallback
          # for resilience).
          NUM=$(echo "$PR_PAYLOAD" | jq -r '.[0].number // empty')
          if [ -z "$NUM" ]; then
            NUM=$(gh pr list --search "$HEAD_SHA" --json number --jq '.[0].number // empty')
          fi
          if [ -z "$NUM" ]; then
            echo "::warning::could not resolve PR number; skipping auto-fix"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$NUM" >> "$GITHUB_OUTPUT"
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Label guard (once per PR)
        id: label-guard
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # `auto-fix-attempted` is the once-per-PR sentinel. Set by both
          # the fix step and the bail step on first run; presence here
          # means "we already had a shot, the operator owns the next move".
          labels=$(gh api "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/labels" --jq '.[].name')
          if echo "$labels" | grep -qx 'auto-fix-attempted'; then
            echo "::notice::PR #${PR_NUMBER} already has auto-fix-attempted; no-op"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head (read-only)
        if: steps.pr.outputs.skip != 'true' && steps.label-guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Token is replaced before the push step; the read-only checkout
          # only needs the default GITHUB_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.pr.outputs.skip != 'true' && steps.label-guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download test-results artifacts
        if: steps.pr.outputs.skip != 'true' && steps.label-guard.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect failure class
        id: detect
        if: steps.pr.outputs.skip != 'true' && steps.label-guard.outputs.skip != 'true'
        env:
          ARTIFACTS_DIR: artifacts
        run: |
          # Tiny inline detector: feeds every test-output.txt under the
          # downloaded artifacts dir into detect-failure-class.js and prints
          # the verdict line `class=<class>` + `fixable=<true|false>`.
          node --input-type=module -e "
            import fs from 'node:fs';
            import path from 'node:path';
            import { detectFailureClass } from './.agents/scripts/lib/auto-fix/detect-failure-class.js';
            const dir = process.env.ARTIFACTS_DIR;
            const out = [];
            if (fs.existsSync(dir)) {
              for (const ent of fs.readdirSync(dir, { withFileTypes: true })) {
                if (!ent.isDirectory()) continue;
                if (!ent.name.startsWith('test-results-')) continue;
                const txt = path.join(dir, ent.name, 'test-output.txt');
                if (!fs.existsSync(txt)) continue;
                const osMatch = ent.name.match(/^test-results-(.+)-node-\d+\$/);
                out.push({ os: osMatch ? osMatch[1] : ent.name, raw: fs.readFileSync(txt, 'utf8') });
              }
            }
            const verdict = detectFailureClass(out);
            process.stdout.write(\`class=\${verdict.class}\nfixable=\${verdict.fixable}\n\`);
          " | tee -a "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.label-guard.outputs.skip != 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APPROVER_APP_ID }}
          private-key: ${{ secrets.BOT_APPROVER_PRIVATE_KEY }}

      - name: Run auto-fix step (lint/format only)
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.label-guard.outputs.skip != 'true' &&
          steps.detect.outputs.fixable == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          FAILURE_CLASS: ${{ steps.detect.outputs.class }}
        run: node .agents/scripts/auto-fix-step.js

      - name: Post bail comment (non-fixable class)
        if: >-
          steps.pr.outputs.skip != 'true' &&
          steps.label-guard.outputs.skip != 'true' &&
          steps.detect.outputs.fixable != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          FAILURE_CLASS: ${{ steps.detect.outputs.class }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: node .agents/scripts/auto-fix-bail.js
