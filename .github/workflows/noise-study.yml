name: Noise study

# One-shot empirical noise capture for the maintainability + CRAP gates.
# Triggered manually via `gh workflow run noise-study.yml -f runs=30 -f ref=<sha>`.
# The job runs in parallel on windows-latest and ubuntu-latest under Node 22,
# uploads the per-runner markdown report and CSV as artifacts, and prints the
# recommended-threshold block to the job summary so a reviewer can paste it
# into `.agents/full-agentrc.json` via a baseline-refresh: commit.
#
# Story #1397 — see docs/noise-study-<date>.md for the combined report once
# the CI artifacts are downloaded and merged into a single docs/ commit.

on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of repeated runs per runner (default 30, max 100)'
        required: false
        default: '30'
      ref:
        description: 'Git ref to study (branch, tag, or SHA). Defaults to the dispatched ref.'
        required: false
        default: ''

concurrency:
  group: noise-study-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Capture (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      - name: Checkout (dispatched ref)
        if: inputs.ref == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout (input ref)
        if: inputs.ref != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Resolve report stem
        id: stem
        shell: bash
        env:
          # Pass workflow inputs / matrix axes via env so shell parameter
          # expansion never sees raw `${{ ... }}` interpolation. This is the
          # GitHub-recommended mitigation for actions/runner workflow command
          # injection (CWE-94) — even though `workflow_dispatch` is gated to
          # maintainers here, a malicious branch ref or input could otherwise
          # smuggle shell metacharacters into the runner.
          MATRIX_OS: ${{ matrix.os }}
        run: |
          # Use the dispatched date so both runners write to the same stem,
          # making downstream "merge into one docs/ report" trivial.
          DATE="$(date -u +%Y-%m-%d)"
          OS_TAG="${MATRIX_OS%-latest}"
          echo "stem=docs/noise-study-${DATE}-${OS_TAG}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Run noise study
        shell: bash
        env:
          AGENT_LOG_LEVEL: info
          # Quarantine workflow_dispatch inputs from the shell command line
          # (CWE-94 mitigation). Numeric / path values are validated by the
          # noise-study.js argv parser, not by the shell.
          INPUT_RUNS: ${{ inputs.runs }}
          STEM: ${{ steps.stem.outputs.stem }}
        run: |
          mkdir -p docs
          node .agents/scripts/noise-study.js \
            --runs "$INPUT_RUNS" \
            --out "${STEM}.md"

      - name: Append job summary
        if: always()
        shell: bash
        env:
          # Mirror Step "Run noise study" — keep `${{ ... }}` out of the
          # shell command line so workflow inputs / matrix axes can never
          # smuggle metacharacters into the runner (CWE-94).
          STEM: ${{ steps.stem.outputs.stem }}
          MATRIX_OS: ${{ matrix.os }}
          STEM_DATE: ${{ steps.stem.outputs.date }}
        run: |
          if [[ -f "${STEM}.md" ]]; then
            echo "## Noise study — ${MATRIX_OS} — ${STEM_DATE}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "${STEM}.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Noise-study report not generated (job failed before write)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # `with:` block runs in the actions runtime, not the shell — these
          # are safe expressions (no shell parser involved).
          name: noise-study-${{ matrix.os }}-${{ steps.stem.outputs.date }}
          path: |
            docs/noise-study-*.md
            docs/noise-study-*.csv
          if-no-files-found: warn
