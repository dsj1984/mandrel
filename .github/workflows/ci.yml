name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and Test
    # Single ubuntu-latest / node 22 leg. The matrix shape was retired in
    # PR #1348 once the only remaining axis was a degenerate one — Windows
    # was removed earlier (operator runs Windows locally; pre-push hook is
    # the real Windows gate), and there is no plan to revive a second
    # Node version on this branch. See #1267 for the per-OS baseline plan
    # if matrix-shaped CI is ever reinstated.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Dependency Vulnerability Audit (SCA)
        run: npm audit --audit-level=high

      - name: Secret Scanning (TruffleHog)
        # Pinned to a released tag rather than the moving `@main` head — a
        # third-party action's default branch is a supply-chain risk vector
        # (CWE-1357). Bump deliberately when a new TruffleHog release ships;
        # `npm run audit-security` flags any reversion to `@main` / `@master`.
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --debug --only-verified

      - name: Lint and Format
        # Story #1829: `npm run lint` now invokes `biome ci .` (lint +
        # format check + import order) in parallel with `markdownlint-cli2`
        # via .agents/scripts/run-lint.js, so the prior separate
        # `npm run format:check` step is folded in and removed.
        run: npm run lint

      - name: Maintainability Check
        # Story #1394 (Epic #1386): the gate CLIs now default --changed-since
        # to a diff-scoped scan against `main`. On PRs we point at the actual
        # base ref (which may not be `main` for backport / release-train PRs);
        # on push-to-main we opt out via --full-scope so a regression in an
        # untouched file still surfaces and a self-comparison doesn't degrade
        # to "no files in diff".
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run maintainability:check -- --changed-since origin/${{ github.base_ref }}
          else
            npm run maintainability:check -- --full-scope
          fi

      - name: Run Tests with Coverage
        # Capture stderr too — Node's test runner and the coverage-threshold
        # gate both emit failures on stderr, and a stdout-only redirect
        # hides them in the uploaded artifact (see Epic #441 Story 4.1).
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-output.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-output.txt

      - name: Coverage Baseline + Floor Check
        # Story #1602 (Epic #1184): the absolute-floor gate is enabled by
        # default inside check-coverage-baseline.js (coverage 90/85/90).
        # On PRs we keep the diff-scoped ratchet (--changed-since base_ref);
        # on push-to-main we run --full-scope so an in-scope file below
        # floor cannot ride along with an unrelated PR. The Maintainability
        # and CRAP floor checks above already cover their gates because
        # those checkers also enable the floor block by default.
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run coverage:check -- --changed-since origin/${{ github.base_ref }}
          else
            npm run coverage:check -- --full-scope
          fi

      # Persist the istanbul/c8 coverage map so the CRAP gate (below) and
      # downstream agent workflows can re-read per-method coverage without
      # re-running the test suite. `if: always()` so a coverage-threshold
      # failure in a previous step still uploads the artifact for triage.
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-final
          path: coverage/coverage-final.json
          if-no-files-found: warn

      - name: CRAP Check
        # Diff-scoped on PRs (--changed-since base_ref) so the gate stays fast
        # on large incoming diffs; full-repo scan on push-to-main so a
        # regression in an untouched file cannot ride in alongside an unrelated
        # PR. Self-skips when `agentSettings.quality.crap.enabled` is
        # false. The `--json` artifact is uploaded for downstream agent
        # workflows.
        #
        # Story #1394 (Epic #1386): the gate CLI now defaults --changed-since
        # to `main`. The PR branch keeps an explicit `origin/<base_ref>` so
        # backport / release-train PRs stay correct; the push-to-main branch
        # passes --full-scope so the new diff-scoped default doesn't degrade
        # to a self-diff (= empty file set) on push-to-main commits.
        run: |
          mkdir -p temp
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run crap:check -- \
              --changed-since origin/${{ github.base_ref }} \
              --json temp/crap-report.json
          else
            npm run crap:check -- --full-scope --json temp/crap-report.json
          fi

      - name: Upload CRAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crap-report
          path: temp/crap-report.json

  publish:
    name: Publish to Dist
    needs: [validate]
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Dist Branch
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          # Capture the contents of .agents/ from main into a temp dir
          mkdir /tmp/instructions-dist
          cp -r .agents/. /tmp/instructions-dist/

          # Switch to dist branch and clear it
          git checkout dist
          git rm -rf . --quiet

          # Copy the contents of .agents/ to the root of dist.
          # Consumers who add this branch as a submodule at .agents/
          # will get: .agents/README.md, .agents/instructions.md, .agents/skills/, etc.
          cp -r /tmp/instructions-dist/. .

          # Stage everything
          git add .

          # Validate that the expected dist structure is present before pushing
          echo "Validating dist contents..."
          test -f instructions.md \
            && test -f VERSION \
            && test -f default-agentrc.json \
            && test -d personas \
            && test -d rules \
            && test -d skills \
            && test -d workflows \
            && echo "Dist structure OK" \
            || { echo "ERROR: Dist validation failed - missing required files"; exit 1; }

          # Commit and push if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-update from main [skip ci]"
            git push origin dist
          else
            echo "No changes to deploy"
          fi
