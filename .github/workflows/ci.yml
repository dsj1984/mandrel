name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and Test
    # Single ubuntu-latest / node 22 leg. The matrix shape was retired in
    # PR #1348 once the only remaining axis was a degenerate one — Windows
    # was removed earlier (operator runs Windows locally; pre-push hook is
    # the real Windows gate), and there is no plan to revive a second
    # Node version on this branch. See #1267 for the per-OS baseline plan
    # if matrix-shaped CI is ever reinstated.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Dependency Vulnerability Audit (SCA)
        run: npm audit --audit-level=high

      - name: Secret Scanning (TruffleHog)
        # Pinned to a released tag rather than the moving `@main` head — a
        # third-party action's default branch is a supply-chain risk vector
        # (CWE-1357). Bump deliberately when a new TruffleHog release ships;
        # `npm run audit-security` flags any reversion to `@main` / `@master`.
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          extra_args: --debug --only-verified

      - name: Lint and Format
        # Story #1829: `npm run lint` now invokes `biome ci .` (lint +
        # format check + import order) in parallel with `markdownlint-cli2`
        # via .agents/scripts/run-lint.js, so the prior separate
        # `npm run format:check` step is folded in and removed.
        run: npm run lint

      - name: Maintainability Check
        # Epic #1943: scope is resolved by the unified dispatcher via
        # delivery.quality.gateScoping (.agentrc.json) — diffRef defaults to
        # main on PR runs; push-to-main runs use --full-scope so untouched
        # files still surface regressions.
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run maintainability:check
          else
            npm run maintainability:check -- --full-scope
          fi

      - name: Run Tests with Coverage
        # Capture stderr too — Node's test runner and the coverage-threshold
        # gate both emit failures on stderr, and a stdout-only redirect
        # hides them in the uploaded artifact (see Epic #441 Story 4.1).
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-output.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-output.txt

      # Story #1981 (Epic #1943): the per-kind coverage / CRAP /
      # maintainability / mutation gates have been folded into the
      # unified `check-baselines.js` runner — see the dedicated
      # `baselines` job below. The c8 coverage map is still uploaded
      # for downstream agent workflows that re-read per-method
      # coverage without re-running the suite.
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-final
          path: coverage/coverage-final.json
          if-no-files-found: warn

  baselines:
    # Story #1912 / Task #1914 — surface the unified floor + tolerance +
    # schema gate as its own status check named `baselines`. As of
    # Epic #1943 (Story #1981) this is the *only* baseline gate: the
    # per-kind coverage / CRAP / maintainability / mutation gates have
    # been deleted and `branchProtection.requiredChecks` has been
    # collapsed to `["lint", "test", "baselines"]`.
    name: baselines
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Run check-baselines
        run: node .agents/scripts/check-baselines.js --format text

  publish:
    name: Publish to Dist
    needs: [validate]
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Dist Branch
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          # Capture the contents of .agents/ from main into a temp dir
          mkdir /tmp/instructions-dist
          cp -r .agents/. /tmp/instructions-dist/

          # Switch to dist branch and clear it
          git checkout dist
          git rm -rf . --quiet

          # Copy the contents of .agents/ to the root of dist.
          # Consumers who add this branch as a submodule at .agents/
          # will get: .agents/README.md, .agents/instructions.md, .agents/skills/, etc.
          cp -r /tmp/instructions-dist/. .

          # Stage everything
          git add .

          # Validate that the expected dist structure is present before pushing
          echo "Validating dist contents..."
          test -f instructions.md \
            && test -f VERSION \
            && test -f starter-agentrc.json \
            && test -f full-agentrc.json \
            && test -d personas \
            && test -d rules \
            && test -d skills \
            && test -d workflows \
            && echo "Dist structure OK" \
            || { echo "ERROR: Dist validation failed - missing required files"; exit 1; }

          # Commit and push if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-update from main [skip ci]"
            git push origin dist
          else
            echo "No changes to deploy"
          fi
