name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Dependency Vulnerability Audit (SCA)
        run: npm audit --audit-level=high

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --debug --only-verified

      - name: Lint and Format
        run: |
          npm run lint
          npm run format:check

      - name: Maintainability Check
        run: npm run maintainability:check

      - name: Run Tests with Coverage
        # Capture stderr too — Node's test runner and the coverage-threshold
        # gate both emit failures on stderr, and a stdout-only redirect
        # hides them in the uploaded artifact (see Epic #441 Story 4.1).
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-output.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-22
          path: test-output.txt

      # Persist the istanbul/c8 coverage map so the CRAP gate (next step) and
      # downstream agent workflows can re-read per-method coverage without
      # re-running the test suite. `if: always()` so a coverage-threshold
      # failure in the previous step still uploads the artifact for triage.
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-final-node-22
          path: coverage/coverage-final.json
          if-no-files-found: warn

      - name: CRAP Check
        # Diff-scoped on PRs (--changed-since base_ref) so the gate stays fast
        # on large incoming diffs; full-repo scan on push-to-main so a
        # regression in an untouched file cannot ride in alongside an unrelated
        # PR. Self-skips when `agentSettings.quality.crap.enabled` is
        # false. The `--json` artifact is uploaded for downstream agent
        # workflows.
        run: |
          mkdir -p temp
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            npm run crap:check -- \
              --changed-since origin/${{ github.base_ref }} \
              --json temp/crap-report.json
          else
            npm run crap:check -- --json temp/crap-report.json
          fi

      - name: Upload CRAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crap-report
          path: temp/crap-report.json

  publish:
    name: Publish to Dist
    needs: [validate]
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Dist Branch
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

          # Capture the contents of .agents/ from main into a temp dir
          mkdir /tmp/instructions-dist
          cp -r .agents/. /tmp/instructions-dist/

          # Switch to dist branch and clear it
          git checkout dist
          git rm -rf . --quiet

          # Copy the contents of .agents/ to the root of dist.
          # Consumers who add this branch as a submodule at .agents/
          # will get: .agents/README.md, .agents/instructions.md, .agents/skills/, etc.
          cp -r /tmp/instructions-dist/. .

          # Stage everything
          git add .

          # Validate that the expected dist structure is present before pushing
          echo "Validating dist contents..."
          test -f instructions.md \
            && test -f VERSION \
            && test -f default-agentrc.json \
            && test -d personas \
            && test -d rules \
            && test -d skills \
            && test -d workflows \
            && echo "Dist structure OK" \
            || { echo "ERROR: Dist validation failed - missing required files"; exit 1; }

          # Commit and push if there are changes
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto-update from main [skip ci]"
            git push origin dist
          else
            echo "No changes to deploy"
          fi
