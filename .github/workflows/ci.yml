name: CI / CD

# Action pinning (Story #3399): third-party `uses:` refs are pinned to full
# 40-char commit SHAs with a `# vX.Y.Z` comment. First-party `actions/*`
# remain on major-version tags (`@v4`) — Dependabot's `github-actions`
# ecosystem updates those tags in-place and SHA-pinning would require a
# manual bump per release with no automated PR surface. Revisit when
# Dependabot action pinning is enabled repo-wide.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and Test
    # Single ubuntu-latest / node 22 leg. The matrix shape was retired in
    # PR #1348 once the only remaining axis was a degenerate one — Windows
    # was removed from this job earlier (#1270) because full Windows
    # coverage + baseline gates produced c8/timing flap with no source
    # defects. A lighter advisory Windows smoke leg lives in the
    # `windows-smoke` job below (Story #3389). See #1267 for the per-OS
    # baseline plan if matrix-shaped CI is ever reinstated.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node & Install
        uses: ./.github/actions/setup

      - name: Dependency Vulnerability Audit (SCA)
        run: npm audit --audit-level=high

      - name: Action Pinning Guard
        # Story #4079: fail the build if any third-party `uses:` ref drifts off
        # a full 40-char commit SHA onto a branch head (`@main`/`@master`) or a
        # floating tag (`@v5`). First-party `actions/*` refs may stay on
        # major-version tags (Dependabot bumps those in-place). This is the
        # real, automated gate the comments below reference — there is no
        # `npm run audit-security` script (that name is only the manual
        # `/audit-security` slash-command lens).
        run: node .agents/scripts/check-action-pinning.js

      - name: Secret Scanning (TruffleHog)
        # Pinned to a released tag rather than the moving `@main` head — a
        # third-party action's default branch is a supply-chain risk vector
        # (CWE-1357). Bump deliberately when a new TruffleHog release ships;
        # the `Action Pinning Guard` step above (check-action-pinning.js)
        # fails the build on any reversion to `@main` / `@master` / a
        # floating tag.
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --debug --only-verified

      - name: Lint and Format
        # Story #1829: `npm run lint` now invokes `biome ci .` (lint +
        # format check + import order) in parallel with `markdownlint-cli2`
        # via .agents/scripts/run-lint.js, so the prior separate
        # `npm run format:check` step is folded in and removed.
        run: npm run lint

      - name: Maintainability Check
        # Epic #1943: scope is resolved by the unified dispatcher via
        # delivery.quality.gateScoping (.agentrc.json) — diffRef defaults
        # to main on PR runs; push-to-main runs set BASELINE_SCOPE=full so
        # untouched files still surface regressions.
        env:
          BASELINE_SCOPE: ${{ github.event_name == 'pull_request' && '' || 'full' }}
        run: npm run maintainability:check

      - name: Build node-pty for the PTY init guard
        # node-pty (1.x) ships no Linux prebuild and the shared setup installs
        # with `npm ci --ignore-scripts`, so its native addon is never compiled
        # and the interactive-init regression guard
        # (tests/e2e/init-interactive.integration.test.js) skips on this Linux
        # gate. `npm rebuild --build-from-source` no-ops here (the flag is not
        # propagated to node-pty's `node scripts/prebuild.js || node-gyp rebuild`
        # install), so build the addon directly with node-gyp (ubuntu-latest
        # ships python3 + make + g++) to produce build/Release/pty.node.
        # Best-effort + non-fatal: the test's own node-pty availability probe
        # still skips the guard gracefully if this build does not yield a
        # loadable binary, so the gate never reds on it.
        run: |
          ( cd node_modules/node-pty && npx --yes node-gyp rebuild ) || echo "::warning::node-pty source build failed; PTY init guard will skip on this run"

      - name: Snapshot temp/ stream hygiene (pre-test)
        # Story #4696: fingerprint the friction / lifecycle / trace NDJSON
        # streams under temp/ before the suite runs, so the post-test assert
        # can fail the build if any test appended fixture records to the real
        # telemetry tree (the writer-isolation regression this guards).
        run: node .agents/scripts/check-test-temp-hygiene.js --snapshot

      - name: Run Tests with Coverage
        # Capture stderr too — Node's test runner and the coverage-threshold
        # gate both emit failures on stderr, and a stdout-only redirect
        # hides them in the uploaded artifact (see Epic #441 Story 4.1).
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee test-output.txt

      - name: Assert temp/ stream hygiene (post-test)
        # Story #4696: fail the build if the suite added or grew any stream
        # file under temp/ relative to the pre-test snapshot. A future writer
        # that bypasses the scratch seam reds here instead of silently
        # polluting friction / rollup / loop-health consumers.
        run: node .agents/scripts/check-test-temp-hygiene.js --assert

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-output.txt

      # Story #1981 (Epic #1943): the per-kind coverage / CRAP /
      # maintainability / mutation gates have been folded into the
      # unified `check-baselines.js` runner — see the dedicated
      # `baselines` job below. The c8 coverage map is still uploaded
      # for downstream agent workflows that re-read per-method
      # coverage without re-running the suite.
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-final
          path: coverage/coverage-final.json
          if-no-files-found: warn

  baselines:
    # Story #1912 / Task #1914 — surface the unified floor + tolerance +
    # schema gate as its own status check named `baselines`. As of
    # Epic #1943 (Story #1981) this is the *only* baseline gate: the
    # per-kind coverage / CRAP / maintainability / mutation gates have
    # been deleted and `branchProtection.requiredChecks` has been
    # collapsed to `["lint", "test", "baselines"]`.
    name: baselines
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node & Install
        uses: ./.github/actions/setup

      - name: Run check-baselines
        run: node .agents/scripts/check-baselines.js --format text

      - name: Architecture Cycle Check
        # Story #4070: wire the import-cycle ratchet (check-arch-cycles.js,
        # allowlist baselines/arch-cycles.json) and the dead-export ratchet
        # (check-dead-exports.js, baseline baselines/dead-exports.json) into
        # the required `baselines` gate. Both are pure-Node, baseline-aware,
        # sub-second checks that were green-but-unenforced — running them here
        # converts documented-but-unenforced boundaries into build-failing
        # guardrails.
        #
        # Story #4438: the context-budget ratchet (check-context-budget.js,
        # budget baselines/context-budget.json) joins the same standalone-ratchet
        # slot — it measures the always-loaded doc closure + resolved
        # docsContextFiles byte totals and fails when a tier grows beyond the
        # committed tolerance, so doc-context growth becomes a conscious
        # baseline-refresh decision.
        #
        # Story #4575: the dead-export ratchet runs a second, production-mode
        # pass (baseline baselines/dead-exports-production.json). The default
        # pass treats tests/** as knip entry points, so an export whose last
        # importer is a test still reads as used — test usage keeps
        # production-dead code invisible. The production pass discounts test
        # importers and ratchets separately, because this repo sanctions
        # test-only exports (.agents/rules/test-seams.md) and its row set is
        # therefore large and largely intentional.
        run: |
          node .agents/scripts/check-arch-cycles.js --format text
          node .agents/scripts/check-dead-exports.js
          node .agents/scripts/check-dead-exports.js --production
          node .agents/scripts/check-context-budget.js

  windows-smoke:
    # Story #3389 — advisory Windows leg. Exercises bootstrap, command sync,
    # config resolution, and the quick test tier without joining the
    # branch-protection required-check set (Validate and Test / baselines
    # names stay unchanged). Catches Windows-only regressions in worktree
    # path handling, PowerShell/npm wiring, and platform-conditional code
    # without reintroducing the c8/timing baseline flap that retired the
    # full Windows matrix leg (#1270).
    name: Windows Smoke
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node & Install
        uses: ./.github/actions/setup

      - name: Bootstrap (dry-run)
        run: node .agents/scripts/bootstrap.js --dry-run --assume-yes --skip-github

      - name: Command Sync
        run: npm run sync:commands

      - name: Config Resolution
        run: >-
          node --experimental-test-module-mocks --test
          tests/shipped-configs-validate.test.js
          tests/lib/config-resolver.test.js

      - name: Fast Test Slice
        run: npm run test:quick
