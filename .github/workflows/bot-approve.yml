name: Bot approver

# Posts an approving review from the `agent-protocols-reviewer` GitHub App
# when the `CI / CD` workflow concludes successfully on a pull_request run.
# The repo ruleset (Story #1240, Task #1254) requires one approving review;
# this workflow supplies it on green CI so the merge button unblocks without
# a human click. Self-authored PRs are skipped so the bot cannot approve
# its own work (which GitHub would reject anyway with 422).

on:
  workflow_run:
    workflows: ["CI / CD"]
    types: [completed]

permissions: {}

jobs:
  approve:
    name: Approve on green CI
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No pull_request attached to workflow_run; nothing to approve."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        if: steps.pr.outputs.skip != 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APPROVER_APP_ID }}
          private-key: ${{ secrets.BOT_APPROVER_PRIVATE_KEY }}

      - name: No-op if bot authored latest commit
        id: self-check
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          author=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[-1].author.login // ""')
          echo "Latest commit author: ${author}"
          case "$author" in
            agent-protocols-reviewer*|*"[bot]")
              echo "Latest commit is bot-authored; skipping approval."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Post approving review
        if: steps.pr.outputs.skip != 'true' && steps.self-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          gh api -X POST "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event=APPROVE \
            -f body='Approved by agent-protocols-reviewer on green CI'
