name: Bot approver

# Posts an approving review from the `agent-protocols-reviewer` GitHub App
# when the `CI / CD` workflow concludes successfully on a pull_request run.
# The repo ruleset (Story #1240, Task #1254) requires one approving review;
# this workflow supplies it on green CI so the merge button unblocks without
# a human click. Self-authored PRs are skipped so the bot cannot approve
# its own work (which GitHub would reject anyway with 422).

on:
  workflow_run:
    workflows: ["CI / CD"]
    types: [completed]

permissions: {}

jobs:
  approve:
    name: Approve on green CI
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No pull_request attached to workflow_run; nothing to approve."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Mint installation token
        id: token
        if: steps.pr.outputs.skip != 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APPROVER_APP_ID }}
          private-key: ${{ secrets.BOT_APPROVER_PRIVATE_KEY }}

      - name: No-op if bot authored latest commit OR commit is an auto-fix
        id: self-check
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          # Two-arm defensive guard against the s4-auto-fix → s3-bot-approve
          # loop closing on itself. The primary arm matches the bot user.login
          # exactly (GitHub appends `[bot]` to App identities); the second
          # arm matches the `[auto-fix]` subject prefix that auto-fix-step.js
          # always writes. Either match short-circuits approval.
          response=$(gh api "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[-1] | { author: (.author.login // ""), subject: (.commit.message // "" | split("\n")[0]) }')
          author=$(echo "$response" | jq -r '.author')
          subject=$(echo "$response" | jq -r '.subject')
          echo "Latest commit author: ${author}"
          echo "Latest commit subject: ${subject}"
          # Arm 1: author login matches the bot.
          case "$author" in
            agent-protocols-reviewer*|*"[bot]")
              echo "Latest commit is bot-authored; skipping approval."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          # Arm 2: commit subject starts with `[auto-fix]` (belt-and-suspenders
          # in case a future change alters who/how auto-fix commits land).
          case "$subject" in
            \[auto-fix\]*)
              echo "Latest commit is an auto-fix commit; skipping approval."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post approving review
        if: steps.pr.outputs.skip != 'true' && steps.self-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          gh api -X POST "repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event=APPROVE \
            -f body='Approved by agent-protocols-reviewer on green CI'
