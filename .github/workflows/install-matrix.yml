name: Install Matrix

# Golden-path install test matrix (Story #3472, Feature #3464, Epic #3436).
#
# Proves the published-package consumer contract end to end across every
# supported package manager and OS axis:
#
#   {npm, pnpm, yarn} x {ubuntu-latest, windows-latest}
#
# Each leg packs THIS repo into a tarball (so the matrix exercises the
# in-tree code, not whatever is currently on the npm registry), installs it
# into a throwaway consumer project with the leg's package manager, and then
# asserts the three golden-path invariants via
# `.agents/scripts/install-matrix-assert.js` (one cross-platform Node script
# instead of divergent PowerShell/bash snippets — see
# `.agents/rules/shell-conventions.md`):
#
#   1. ./.agents/ is materialized after install + `mandrel sync`.
#   2. The consumer package.json is not mutated with framework runtime deps.
#   3. `mandrel doctor` returns a ready verdict.
#
# `mandrel doctor`'s `gh-auth` check confirms the GitHub CLI can authenticate,
# so each leg exports the workflow's GITHUB_TOKEN as GH_TOKEN. `gh auth status`
# performs live token validation that an Actions installation token cannot pass
# (`GET /user` → 403 for integration tokens), so the check degrades to
# warn-and-skip when a token is present in the environment — the runtime
# authenticates non-interactively with that token regardless.
# Doctor's `commands-in-sync` check compares `.agents/workflows/` to
# `.claude/commands/` relative to the installed package, so the leg also runs
# `mandrel sync-commands` (the same step the bootstrap/postinstall flow runs)
# before doctor so the verdict is honestly green.
#
# Action pinning mirrors ci.yml: first-party `actions/*` stay on major-version
# tags so Dependabot's github-actions ecosystem can bump them in place.
#
# ── Release gating (Story #3564) ─────────────────────────────────────────────
# This workflow is the release gate for the published-package consumer contract.
# To avoid the classic required-check + path-filter deadlock (a path-filtered
# workflow never reports on PRs that don't touch the filtered paths, so a
# required check hangs "pending" forever), the matrix is split by trigger event
# into two reporting profiles that share ONE job body:
#
#   • GATE (required, always reports): a 2-leg diagonal that runs on EVERY
#     `pull_request` to `main` and on `push` to `main`, with NO path filter:
#       - install (npm / ubuntu-latest)   — dominant PM, fastest happy path
#       - install (yarn / windows-latest) — the most fragile combo; exercises
#         the MSYS/`cygpath` tarball-path handling documented in the Pack step.
#     Because there is no path filter on the gating path, the check reports on
#     every PR (including the release PR, which bumps package.json) so the
#     required check never hangs "pending".
#
#   • COVERAGE (non-blocking sweep): all 6 legs
#     (`{npm, pnpm, yarn} × {ubuntu-latest, windows-latest}`) run on a nightly
#     `schedule` and on `workflow_dispatch`, so pnpm and npm-on-Windows
#     regressions are still caught (≤24h latency) without taxing every PR or
#     adding flake surface to the release-blocking path.
#
# OPERATOR ACTION (branch protection on `main`): add these two job names to the
# required-status-check set so the Install Matrix gate actually blocks merges
# (including the release PR). Add EXACTLY these two checks, not the whole
# workflow:
#       install (npm / ubuntu-latest)
#       install (yarn / windows-latest)
# (See CLAUDE.md → "Two-package release topology" for the same operator note.)
# The internal `select-matrix` setup job is plumbing and must NOT be added to
# branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    # Nightly full-coverage sweep (06:17 UTC) across all 6 legs.
    - cron: '17 6 * * *'
  workflow_dispatch: # Allow manual triggering (runs the full 6-leg sweep)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  select-matrix:
    # Internal plumbing: emit the matrix leg set keyed off the trigger event.
    # `pull_request` / `push` → 2-leg required GATE; `schedule` /
    # `workflow_dispatch` → full 6-leg non-blocking COVERAGE sweep. Keeping the
    # selection in one place lets the single `install-matrix` job body below
    # stay the sole copy of the pack → install → sync → sync-commands → assert →
    # doctor sequence (no step-body duplication). Do NOT add this job to
    # branch-protection required checks — it is not a gate.
    name: select-matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.select.outputs.include }}
    steps:
      - name: Select matrix legs for this event
        id: select
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          gate='[{"package-manager":"npm","os":"ubuntu-latest"},{"package-manager":"yarn","os":"windows-latest"}]'
          full='[{"package-manager":"npm","os":"ubuntu-latest"},{"package-manager":"pnpm","os":"ubuntu-latest"},{"package-manager":"yarn","os":"ubuntu-latest"},{"package-manager":"npm","os":"windows-latest"},{"package-manager":"pnpm","os":"windows-latest"},{"package-manager":"yarn","os":"windows-latest"}]'
          case "$EVENT_NAME" in
            pull_request|push)
              include="$gate"
              ;;
            schedule|workflow_dispatch)
              include="$full"
              ;;
            *)
              # Unknown trigger: fall back to the safe required GATE subset.
              include="$gate"
              ;;
          esac
          echo "include=$include" >> "$GITHUB_OUTPUT"

  install-matrix:
    needs: select-matrix
    # The job-name template resolves to deterministic, branch-protection-stable
    # check names — on PR/push the GATE legs report exactly as
    # `install (npm / ubuntu-latest)` and `install (yarn / windows-latest)`.
    name: install (${{ matrix.package-manager }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep fail-fast off so one leg's failure does not mask the others
      # (required by the gating contract — both gate legs must report).
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-matrix.outputs.include) }}
    env:
      # `mandrel doctor`'s gh-auth check shells out to `gh auth status`, which
      # reads GH_TOKEN. The auto-injected workflow token authenticates the
      # preinstalled GitHub CLI on hosted runners.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (pnpm / yarn shims)
        run: corepack enable

      - name: Install dev dependencies (for the pack prepare hook)
        # `npm pack` triggers the package's `prepare` hook
        # (`husky && npm run sync:commands`). On the runner's bundled npm
        # (Node 22 / npm 10.x), `npm pack --ignore-scripts` does NOT reliably
        # skip `prepare` (unlike npm 11+), and `prepare` needs the `husky`
        # binary plus the framework's runtime deps. Install them first so the
        # hook resolves. The repo `.npmrc` sets `ignore-scripts=true`, so this
        # install itself runs no lifecycle scripts — it only populates
        # `node_modules` (incl. `node_modules/.bin/husky`).
        shell: bash
        run: npm ci

      - name: Pack the framework into a tarball
        # `npm pack` honors package.json `files` (`.agents/`, `bin/`, `lib/`)
        # and the publishable surface, so the consumer install below exercises
        # exactly what `npm publish` would ship. Deps are installed above so the
        # `prepare` hook resolves regardless of how the runner's npm treats
        # `--ignore-scripts` on pack.
        shell: bash
        run: |
          mkdir -p artifact
          TARBALL=$(npm pack --pack-destination "$PWD/artifact" | tail -1)
          ABS="$PWD/artifact/$TARBALL"
          # On Windows runners, bash hands back an MSYS path (/d/a/...). npm and
          # pnpm tolerate it, but yarn-classic resolves it natively and fails
          # ("Tarball ... can not be located"). cygpath -m emits a native mixed
          # path (D:/a/...) that all three accept; on Linux cygpath is absent so
          # the POSIX path is used as-is.
          if command -v cygpath >/dev/null 2>&1; then
            ABS="$(cygpath -m "$ABS")"
          fi
          echo "TARBALL_PATH=$ABS" >> "$GITHUB_ENV"
          echo "Packed $TARBALL -> $ABS"

      - name: Scaffold a throwaway consumer project
        # A minimal consumer with one unrelated dep (left-pad) so we can prove
        # the install adds the framework package WITHOUT touching the
        # consumer's own declared deps or injecting framework runtime deps.
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cat > "$RUNNER_TEMP/consumer/package.json" <<'JSON'
          {
            "name": "install-matrix-consumer",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "left-pad": "^1.3.0"
            }
          }
          JSON
          echo "CONSUMER_DIR=$RUNNER_TEMP/consumer" >> "$GITHUB_ENV"

      - name: Install the framework with ${{ matrix.package-manager }}
        # `--ignore-scripts` (and the pnpm/yarn equivalents) is intentional:
        # it forces the "postinstall was skipped" path so the explicit
        # `mandrel sync` step below is what materializes ./.agents/ — the exact
        # situation `mandrel doctor`'s agents-materialized remedy describes.
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -euo pipefail
          case "${{ matrix.package-manager }}" in
            npm)
              npm install --ignore-scripts "$TARBALL_PATH"
              ;;
            pnpm)
              pnpm add --ignore-scripts "$TARBALL_PATH"
              ;;
            yarn)
              # Classic yarn (corepack default for `yarn`) installs the tarball
              # by file path and skips lifecycle scripts with --ignore-scripts.
              yarn add --ignore-scripts "file:$TARBALL_PATH"
              ;;
            *)
              echo "Unknown package manager: ${{ matrix.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Resolve the mandrel CLI entry point
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          echo "MANDREL_BIN=$CONSUMER_DIR/node_modules/@mandrelai/agents/bin/mandrel.js" >> "$GITHUB_ENV"

      - name: Materialize .agents/ (mandrel sync)
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync

      - name: Sync slash commands (mandrel sync-commands)
        # Populates .claude/commands/ so doctor's commands-in-sync check passes
        # — the same step the bootstrap/postinstall onboarding flow performs.
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync-commands

      - name: Assert materialization + clean consumer manifest
        shell: bash
        run: |
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check materialized \
            --check manifest-clean

      - name: Run mandrel doctor and require a ready verdict
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"
