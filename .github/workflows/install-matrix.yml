name: Install Matrix

# Golden-path install test matrix (Story #3472, Feature #3464, Epic #3436).
#
# Proves the published-package consumer contract end to end across every
# supported package manager and OS axis:
#
#   {npm, pnpm, yarn} x {ubuntu-latest, windows-latest}
#
# Each leg packs THIS repo into a tarball (so the matrix exercises the
# in-tree code, not whatever is currently on the npm registry), installs it
# into a throwaway consumer project with the leg's package manager, and then
# asserts the three golden-path invariants via
# `.agents/scripts/install-matrix-assert.js` (one cross-platform Node script
# instead of divergent PowerShell/bash snippets — see
# `.agents/rules/shell-conventions.md`):
#
#   1. ./.agents/ is materialized after install + `mandrel sync`.
#   2. The consumer package.json is not mutated with framework runtime deps.
#   3. `mandrel doctor` returns a ready verdict.
#
# `mandrel doctor`'s `gh-auth` check confirms the GitHub CLI can authenticate,
# so each leg exports the workflow's GITHUB_TOKEN as GH_TOKEN. `gh auth status`
# performs live token validation that an Actions installation token cannot pass
# (`GET /user` → 403 for integration tokens), so the check degrades to
# warn-and-skip when a token is present in the environment — the runtime
# authenticates non-interactively with that token regardless.
# Doctor's `commands-in-sync` check compares `.agents/workflows/` to
# `.claude/commands/` relative to the installed package, so the leg also runs
# `mandrel sync-commands` (the same step the bootstrap/postinstall flow runs)
# before doctor so the verdict is honestly green.
#
# Action pinning mirrors ci.yml: first-party `actions/*` stay on major-version
# tags so Dependabot's github-actions ecosystem can bump them in place.
#
# ── Release gating (Story #3564) ─────────────────────────────────────────────
# This workflow is the release gate for the published-package consumer contract.
# To avoid the classic required-check + path-filter deadlock (a path-filtered
# workflow never reports on PRs that don't touch the filtered paths, so a
# required check hangs "pending" forever), the matrix is split by trigger event
# into two reporting profiles that share ONE job body:
#
#   • GATE (required, always reports): a 2-leg diagonal that runs on EVERY
#     `pull_request` to `main` and on `push` to `main`, with NO path filter:
#       - install (npm / ubuntu-latest)   — dominant PM, fastest happy path
#       - install (yarn / windows-latest) — the most fragile combo; exercises
#         the MSYS/`cygpath` tarball-path handling documented in the Pack step.
#     Because there is no path filter on the gating path, the check reports on
#     every PR (including the release PR, which bumps package.json) so the
#     required check never hangs "pending".
#
#   • COVERAGE (non-blocking sweep): all 6 legs
#     (`{npm, pnpm, yarn} × {ubuntu-latest, windows-latest}`) run on a nightly
#     `schedule` and on `workflow_dispatch`, so pnpm and npm-on-Windows
#     regressions are still caught (≤24h latency) without taxing every PR or
#     adding flake surface to the release-blocking path.
#
# ── Extra contract legs (Story #4049 — C2) ───────────────────────────────────
# Three additional nightly-coverage legs run in the `install-contract` job
# (schedule / workflow_dispatch only — non-blocking; not added to branch
# protection to avoid the required-check deadlock):
#
#   1. postinstall-materialization — installs npm WITHOUT --ignore-scripts,
#      so the postinstall hook (bin/postinstall.js → mandrel sync) runs at
#      install time. Asserts .agents/ is materialized and doctor is ready
#      WITHOUT a manual `mandrel sync` step.
#   2. cold-start — exercises the Story #4045 `mandrel init` single-command
#      path end-to-end: npm install → mandrel init --assume-yes (non-interactive)
#      → doctor ready.
#   3. materialized-script-run (pnpm) — installs with pnpm (isolated
#      layout), mandrel sync, then runs a materialized .agents/scripts/*.js
#      from the consumer root. This exercises the Story #4046 anchoring fix:
#      if scripts free-ride on consumer node_modules they fail here.
#   4. update-reexec-pnpm — installs with pnpm (--ignore-scripts, so .agents/
#      is NOT materialized = drift), then drives `mandrel update`'s drift-heal
#      path with the registry probe forced to the installed version (target ==
#      current → no real bump). That path re-execs `sync` / `sync-commands`
#      from the NEW binary via resolveNewBinPath(projectRoot) →
#      node_modules/.bin/mandrel, the exact seam that diverges under pnpm's
#      symlinked / `.pnpm` layout (Story #4034, #4173). Asserts the re-exec
#      materialized .agents/ and that `mandrel doctor` is ready afterward,
#      proving resolveNewBinPath resolved a runnable binary under pnpm.
#
# Gate-vs-nightly decision (Story #4173 AC3): the update-reexec-pnpm leg stays
# NIGHTLY-ONLY (Coverage profile), NOT promoted to the required branch-protection
# Gate set. Rationale: it shares the same required-check + path-filter deadlock
# risk the file header documents, adds a `mandrel update` re-exec (extra spawn /
# install surface = more flake) to the release-blocking path, and the pnpm
# re-exec boundary is a regression-catcher (≤24h latency acceptable), not a
# release-correctness invariant the Gate legs already cover. Promote only if a
# pnpm-layout resolveNewBinPath regression slips a release despite nightly cover.
#
# OPERATOR ACTION (branch protection on `main`): add these two job names to the
# required-status-check set so the Install Matrix gate actually blocks merges
# (including the release PR). Add EXACTLY these two checks, not the whole
# workflow:
#       install (npm / ubuntu-latest)
#       install (yarn / windows-latest)
# (See CLAUDE.md → "Two-package release topology" for the same operator note.)
# The internal `select-matrix` setup job is plumbing and must NOT be added to
# branch protection.
# The `install-contract` job (extra legs) is nightly-coverage and must NOT be
# added to branch protection.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    # Nightly full-coverage sweep (06:17 UTC) across all 6 legs.
    - cron: '17 6 * * *'
  workflow_dispatch: # Allow manual triggering (runs the full 6-leg sweep)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  select-matrix:
    # Internal plumbing: emit the matrix leg set keyed off the trigger event.
    # `pull_request` / `push` → 2-leg required GATE; `schedule` /
    # `workflow_dispatch` → full 6-leg non-blocking COVERAGE sweep. Keeping the
    # selection in one place lets the single `install-matrix` job body below
    # stay the sole copy of the pack → install → sync → sync-commands → assert →
    # doctor sequence (no step-body duplication). Do NOT add this job to
    # branch-protection required checks — it is not a gate.
    name: select-matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.select.outputs.include }}
    steps:
      - name: Select matrix legs for this event
        id: select
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          gate='[{"package-manager":"npm","os":"ubuntu-latest"},{"package-manager":"yarn","os":"windows-latest"}]'
          full='[{"package-manager":"npm","os":"ubuntu-latest"},{"package-manager":"pnpm","os":"ubuntu-latest"},{"package-manager":"yarn","os":"ubuntu-latest"},{"package-manager":"npm","os":"windows-latest"},{"package-manager":"pnpm","os":"windows-latest"},{"package-manager":"yarn","os":"windows-latest"}]'
          case "$EVENT_NAME" in
            pull_request|push)
              include="$gate"
              ;;
            schedule|workflow_dispatch)
              include="$full"
              ;;
            *)
              # Unknown trigger: fall back to the safe required GATE subset.
              include="$gate"
              ;;
          esac
          echo "include=$include" >> "$GITHUB_OUTPUT"

  install-matrix:
    needs: select-matrix
    # The job-name template resolves to deterministic, branch-protection-stable
    # check names — on PR/push the GATE legs report exactly as
    # `install (npm / ubuntu-latest)` and `install (yarn / windows-latest)`.
    name: install (${{ matrix.package-manager }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep fail-fast off so one leg's failure does not mask the others
      # (required by the gating contract — both gate legs must report).
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.select-matrix.outputs.include) }}
    env:
      # `mandrel doctor`'s gh-auth check shells out to `gh auth status`, which
      # reads GH_TOKEN. The auto-injected workflow token authenticates the
      # preinstalled GitHub CLI on hosted runners.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm / yarn shims)
        run: corepack enable

      - name: Install dev dependencies (for the pack prepare hook)
        # `npm pack` triggers the package's `prepare` hook
        # (`husky && npm run sync:commands`). On the runner's bundled npm
        # (Node 22 / npm 10.x), `npm pack --ignore-scripts` does NOT reliably
        # skip `prepare` (unlike npm 11+), and `prepare` needs the `husky`
        # binary plus the framework's runtime deps. Install them first so the
        # hook resolves. The repo `.npmrc` sets `ignore-scripts=true`, so this
        # install itself runs no lifecycle scripts — it only populates
        # `node_modules` (incl. `node_modules/.bin/husky`).
        shell: bash
        run: npm ci

      - name: Pack the framework into a tarball
        # `npm pack` honors package.json `files` (`.agents/`, `bin/`, `lib/`)
        # and the publishable surface, so the consumer install below exercises
        # exactly what `npm publish` would ship. Deps are installed above so the
        # `prepare` hook resolves regardless of how the runner's npm treats
        # `--ignore-scripts` on pack.
        shell: bash
        run: |
          mkdir -p artifact
          TARBALL=$(npm pack --pack-destination "$PWD/artifact" | tail -1)
          ABS="$PWD/artifact/$TARBALL"
          # On Windows runners, bash hands back an MSYS path (/d/a/...). npm and
          # pnpm tolerate it, but yarn-classic resolves it natively and fails
          # ("Tarball ... can not be located"). cygpath -m emits a native mixed
          # path (D:/a/...) that all three accept; on Linux cygpath is absent so
          # the POSIX path is used as-is.
          if command -v cygpath >/dev/null 2>&1; then
            ABS="$(cygpath -m "$ABS")"
          fi
          echo "TARBALL_PATH=$ABS" >> "$GITHUB_ENV"
          echo "Packed $TARBALL -> $ABS"

      - name: Scaffold a throwaway consumer project
        # A minimal consumer with one unrelated dep (left-pad) so we can prove
        # the install adds the framework package WITHOUT touching the
        # consumer's own declared deps or injecting framework runtime deps.
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cat > "$RUNNER_TEMP/consumer/package.json" <<'JSON'
          {
            "name": "install-matrix-consumer",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "left-pad": "^1.3.0"
            }
          }
          JSON
          echo "CONSUMER_DIR=$RUNNER_TEMP/consumer" >> "$GITHUB_ENV"

      - name: Install the framework with ${{ matrix.package-manager }}
        # `--ignore-scripts` (and the pnpm/yarn equivalents) is intentional:
        # it forces the "postinstall was skipped" path so the explicit
        # `mandrel sync` step below is what materializes ./.agents/ — the exact
        # situation `mandrel doctor`'s agents-materialized remedy describes.
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -euo pipefail
          case "${{ matrix.package-manager }}" in
            npm)
              npm install --ignore-scripts "$TARBALL_PATH"
              ;;
            pnpm)
              # `--shamefully-hoist` lifts mandrel's transitive runtime deps
              # (ajv, js-yaml, …) to the consumer's top-level node_modules.
              # pnpm's default isolated layout only hoists them into the `.pnpm`
              # virtual store, which the materialized `.agents/scripts/*.js`
              # (run from the consumer root, free-riding on consumer
              # node_modules) cannot reach — so without this flag doctor
              # honestly fails `runtime-deps`. This mirrors the supported pnpm
              # consumer contract documented in .agents/README.md.
              pnpm add --ignore-scripts --shamefully-hoist "$TARBALL_PATH"
              ;;
            yarn)
              # Classic yarn (corepack default for `yarn`) installs the tarball
              # by file path and skips lifecycle scripts with --ignore-scripts.
              yarn add --ignore-scripts "file:$TARBALL_PATH"
              ;;
            *)
              echo "Unknown package manager: ${{ matrix.package-manager }}" >&2
              exit 1
              ;;
          esac

      - name: Resolve the mandrel CLI entry point
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          echo "MANDREL_BIN=$CONSUMER_DIR/node_modules/mandrel/bin/mandrel.js" >> "$GITHUB_ENV"

      - name: Materialize .agents/ (mandrel sync)
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync

      - name: Sync slash commands (mandrel sync-commands)
        # Populates .claude/commands/ so doctor's commands-in-sync check passes
        # — the same step the bootstrap/postinstall onboarding flow performs.
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync-commands

      - name: Assert materialization + clean consumer manifest
        shell: bash
        run: |
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check materialized \
            --check manifest-clean

      - name: Run mandrel doctor and require a ready verdict
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"

  # ── PROPOSAL (Story #4081 — not yet implemented) ───────────────────────────
  # The declared engines range is `>=22.22.1 <25`, but every job pins Node via
  # the repo-root `.nvmrc` (currently `22`), so 23/24 are permitted but never
  # exercised. Proposal: add a non-blocking nightly leg that runs the quick
  # test tier (`npm run test:quick`) on Node 24 to cover the upper bound of the
  # range, gated `if: github.event_name == 'schedule' || ... workflow_dispatch`
  # like the install-contract legs below, and explicitly NOT added to
  # branch-protection required checks. Sketch:
  #
  #   node24-upper-bound:
  #     if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
  #     name: node24-upper-bound
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@v4
  #       - uses: actions/setup-node@v4
  #         with: { node-version: 24, cache: 'npm' }
  #       - run: npm ci --ignore-scripts
  #       - run: npm run test:quick
  #
  # Deliberately left as a comment per the Story's "propose (do not yet add)"
  # instruction; promote to a live job in a follow-up.

  # ── Extra contract legs (Story #4049 — C2) ─────────────────────────────────
  # Non-blocking nightly-coverage legs. Do NOT add these to branch-protection
  # required checks — see the required-check deadlock note in the file header.
  install-contract:
    # Only run on nightly schedule and manual dispatch — not on every PR/push,
    # which would add flake surface to the release-blocking path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: install-contract (${{ matrix.leg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg:
          - postinstall-materialization
          - cold-start
          - materialized-script-run
          - update-reexec-pnpm
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (pnpm / yarn shims)
        run: corepack enable

      - name: Install dev dependencies (for the pack prepare hook)
        shell: bash
        run: npm ci

      - name: Pack the framework into a tarball
        shell: bash
        run: |
          mkdir -p artifact
          TARBALL=$(npm pack --pack-destination "$PWD/artifact" | tail -1)
          echo "TARBALL_PATH=$PWD/artifact/$TARBALL" >> "$GITHUB_ENV"
          echo "Packed $TARBALL"

      - name: Scaffold a throwaway consumer project
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cat > "$RUNNER_TEMP/consumer/package.json" <<'JSON'
          {
            "name": "install-matrix-consumer",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "left-pad": "^1.3.0"
            }
          }
          JSON
          echo "CONSUMER_DIR=$RUNNER_TEMP/consumer" >> "$GITHUB_ENV"
          echo "MANDREL_BIN=$RUNNER_TEMP/consumer/node_modules/mandrel/bin/mandrel.js" >> "$GITHUB_ENV"

      # ── Leg: postinstall-materialization ─────────────────────────────────────
      # Install npm WITHOUT --ignore-scripts so bin/postinstall.js fires
      # automatically (mandrel sync). Assert .agents/ is present without any
      # manual sync step, proving the postinstall hook works.
      - name: "[postinstall] Install npm with scripts enabled"
        if: matrix.leg == 'postinstall-materialization'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: npm install "$TARBALL_PATH"

      - name: "[postinstall] Sync slash commands (mandrel sync-commands)"
        if: matrix.leg == 'postinstall-materialization'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync-commands

      - name: "[postinstall] Assert materialization without explicit sync"
        if: matrix.leg == 'postinstall-materialization'
        shell: bash
        run: |
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check materialized \
            --check manifest-clean

      - name: "[postinstall] Run mandrel doctor and require a ready verdict"
        if: matrix.leg == 'postinstall-materialization'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"

      # ── Leg: cold-start ───────────────────────────────────────────────────────
      # Exercises the Story #4045 single-command path end-to-end:
      #   npm install --ignore-scripts → mandrel init --assume-yes → doctor ready.
      - name: "[cold-start] Install npm with --ignore-scripts"
        if: matrix.leg == 'cold-start'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: npm install --ignore-scripts "$TARBALL_PATH"

      - name: "[cold-start] Run mandrel init --assume-yes (cold-start bootstrap)"
        if: matrix.leg == 'cold-start'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # --assume-yes accepts all prompts non-interactively, exercising the full
        # single-command bootstrap path introduced in Story #4045.
        run: node "$MANDREL_BIN" init --assume-yes

      - name: "[cold-start] Assert materialization after mandrel init"
        if: matrix.leg == 'cold-start'
        shell: bash
        run: |
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check materialized

      - name: "[cold-start] Run mandrel doctor and require a ready verdict"
        if: matrix.leg == 'cold-start'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"

      # ── Leg: materialized-script-run (pnpm) ──────────────────────────────────
      # Installs with pnpm, mandrel sync, then runs a materialized
      # .agents/scripts/*.js from the consumer root. The materialized scripts
      # use bare imports (`import Ajv from 'ajv'`) resolved from their own
      # location, which walks up to the consumer's top-level node_modules.
      # pnpm's default isolated layout hoists mandrel's transitive deps only
      # into the `.pnpm` virtual store — never to the top level — so the
      # materialized scripts (and the doctor `runtime-deps` check anchored at
      # the consumer root, Story #4046 A2) genuinely cannot resolve them.
      # `--shamefully-hoist` lifts them to the top level, which IS the supported
      # pnpm consumer contract (see .agents/README.md). This leg therefore
      # exercises the supported configuration end to end; a pnpm-without-hoist
      # install is intentionally NOT supported (doctor correctly reports it
      # unready).
      - name: "[script-run] Install pnpm (--shamefully-hoist, --ignore-scripts)"
        if: matrix.leg == 'materialized-script-run'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: pnpm add --ignore-scripts --shamefully-hoist "$TARBALL_PATH"

      - name: "[script-run] Materialize .agents/ (mandrel sync)"
        if: matrix.leg == 'materialized-script-run'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync

      - name: "[script-run] Sync slash commands (mandrel sync-commands)"
        if: matrix.leg == 'materialized-script-run'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: node "$MANDREL_BIN" sync-commands

      - name: "[script-run] Run a materialized .agents/scripts/*.js from consumer root"
        if: matrix.leg == 'materialized-script-run'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # The materialized .agents/scripts/ free-ride on the consumer's
        # top-level node_modules (Story #4046 A2 anchors the doctor runtime-deps
        # check there to mirror that). With --shamefully-hoist applied above the
        # deps are present at the top level; a free-ride breakage (e.g. a
        # missing-hoist regression) would surface here as MODULE_NOT_FOUND.
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"

      - name: "[script-run] Execute a materialized consumer script (pnpm free-ride guard)"
        if: matrix.leg == 'materialized-script-run'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # Regression class: pnpm free-ride / dependency anchoring (Story #4046).
        # The previous step runs the *packaged* doctor bin; this step executes
        # a file genuinely materialized under $CONSUMER_DIR/.agents/scripts/
        # with cwd=$CONSUMER_DIR. validate-skills.js imports third-party deps
        # (ajv, ajv-formats) at module top, so even its read-only `--help` run
        # (exits 0) proves materialized scripts resolve runtime deps through
        # the package-root anchoring rather than free-riding on the consumer's
        # node_modules layout — under pnpm's isolated layout a free-ride
        # regression dies here with ERR_MODULE_NOT_FOUND.
        run: node ./.agents/scripts/validate-skills.js --help

      # ── Leg: update-reexec-pnpm ──────────────────────────────────────────────
      # Drives `mandrel update`'s post-install re-exec boundary
      # (resolveNewBinPath → node_modules/.bin/mandrel → sync / sync-commands
      # from the NEW binary) under pnpm's symlinked / `.pnpm` node_modules
      # layout — the seam most likely to diverge from the npm happy path the
      # unit tests cover (Story #4034, #4173).
      #
      # `--shamefully-hoist` is intentional: it hoists mandrel's transitive
      # runtime deps (ajv, js-yaml, …) to the consumer's top-level node_modules
      # so the doctor `runtime-deps` check (anchored at the consumer root, Story
      # #4046 A2) is reachable. Without it, doctor fails `runtime-deps` for an
      # ORTHOGONAL pnpm-hoisting reason and masks the re-exec boundary this leg
      # exists to test. The `.pnpm` virtual store and the symlinked
      # `node_modules/.bin/mandrel` shim remain pnpm-specific, so
      # resolveNewBinPath is still genuinely exercised under a pnpm layout.
      - name: "[update-reexec] Install pnpm (--shamefully-hoist, --ignore-scripts)"
        if: matrix.leg == 'update-reexec-pnpm'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        run: pnpm add --ignore-scripts --shamefully-hoist "$TARBALL_PATH"

      - name: "[update-reexec] Materialize .agents/ once, then induce drift"
        if: matrix.leg == 'update-reexec-pnpm'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # `mandrel update`'s drift-heal path only fires when .agents/ exists but
        # is STALE (runAgentsDrift returns ok:false on a missing/differing
        # payload file). A wholly-absent .agents/ short-circuits to "already up
        # to date" (agents-materialized owns that remedy, not drift-heal). So:
        # materialize the payload, then delete one tracked file to manufacture a
        # deterministic drift the re-exec must heal.
        run: |
          set -euo pipefail
          node "$MANDREL_BIN" sync
          test -f .agents/instructions.md || {
            echo "::error::initial mandrel sync did not materialize .agents/instructions.md" >&2
            exit 1
          }
          rm -f .agents/instructions.md
          if [ -f .agents/instructions.md ]; then
            echo "::error::failed to delete .agents/instructions.md to induce drift" >&2
            exit 1
          fi
          echo "drift induced: .agents/instructions.md removed."

      - name: "[update-reexec] Drive mandrel update drift-heal (re-exec from new binary)"
        if: matrix.leg == 'update-reexec-pnpm'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # Drive the production `run()` entrypoint from lib/cli/update.js with the
        # registry version probe forced to the INSTALLED version (target ==
        # current) so update takes the drift-heal branch — no real npm bump, no
        # network. The drift-heal branch runs the PRODUCTION spawnPhase
        # (defaultSpawnPhase → resolveNewBinPath → node_modules/.bin/mandrel),
        # so this genuinely re-execs `sync` + `sync-commands` from the new binary
        # under pnpm's layout. A pnpm-layout resolveNewBinPath regression
        # surfaces here as a failed spawn / non-zero phase exit.
        #
        # The driver is written INTO the consumer dir (not $RUNNER_TEMP): ESM
        # bare-specifier resolution walks up from the importing file's directory,
        # so `import 'mandrel/...'` only resolves when the file sits under the
        # consumer's node_modules tree.
        run: |
          set -euo pipefail
          cat > "$CONSUMER_DIR/drive-update-reexec.mjs" <<'NODE'
          import { createRequire } from 'node:module';
          import run from 'mandrel/lib/cli/update.js';

          const require = createRequire(import.meta.url);
          // Resolve the installed mandrel package's own version so the forced
          // registry probe returns target === current (drift-heal, no bump).
          const pkgPath = require.resolve('mandrel/package.json');
          const installedVersion = require(pkgPath).version;

          // versionRunner is the ONLY network boundary seam we stub; every
          // other seam (spawnPhase / resolveNewBinPath / sync / sync-commands)
          // stays production so the pnpm re-exec boundary is genuinely exercised.
          await run([], {
            versionRunner: () => installedVersion,
            exit: (code) => {
              if (code !== 0) {
                process.exitCode = code;
                throw new Error(`mandrel update exited ${code}`);
              }
            },
          });
          NODE
          node ./drive-update-reexec.mjs
          # The re-exec'd `sync` must have restored the file we deleted.
          test -f .agents/instructions.md || {
            echo "::error::drift-heal re-exec did not restore .agents/instructions.md" >&2
            exit 1
          }

      - name: "[update-reexec] Assert re-exec materialized .agents/ under pnpm"
        if: matrix.leg == 'update-reexec-pnpm'
        shell: bash
        # Proves resolveNewBinPath resolved a RUNNABLE binary under pnpm: the
        # re-exec'd `sync` from node_modules/.bin/mandrel materialized .agents/.
        run: |
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check materialized \
            --check manifest-clean

      - name: "[update-reexec] Run mandrel doctor and require a ready verdict"
        if: matrix.leg == 'update-reexec-pnpm'
        shell: bash
        working-directory: ${{ env.CONSUMER_DIR }}
        # AC2: after the update re-exec, doctor must report ready under pnpm.
        run: |
          set -o pipefail
          node "$MANDREL_BIN" doctor 2>&1 | tee "$RUNNER_TEMP/doctor-output.txt"
          node "$GITHUB_WORKSPACE/.agents/scripts/install-matrix-assert.js" \
            --consumer "$CONSUMER_DIR" \
            --check doctor-ready \
            --doctor-output "$RUNNER_TEMP/doctor-output.txt"
