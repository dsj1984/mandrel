name: Release Please

# Action pinning (Story #3399): third-party `uses:` refs are pinned to full
# 40-char commit SHAs with a `# vX.Y.Z` comment. First-party `actions/*`
# remain on major-version tags (`@v4`) — see ci.yml header for rationale.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    # Multi-package (manifest) output naming — verified against
    # release-please-action v5.0.0 `src/index.ts#setPathOutput`:
    #
    #   if (path === '.') core.setOutput(key, value)           // root: UN-prefixed
    #   else              core.setOutput(`${path}--${key}`, …)  // non-root: prefixed
    #
    # The root `mandrel` package has manifest path `.`, so its outputs are the
    # **un-prefixed** `release_created` / `tag_name`. Only **non-root** packages
    # (the launcher, path `create-mandrel`) get the `${path}--${key}` prefix.
    # There is therefore no `.--release_created` output — keying off it (as the
    # initial Story #3891 wiring did) silently skips the root publish on every
    # release. The singular `release_created` is **root-specific** (set only
    # when the root path releases, never on a launcher-only release), so it is
    # the correct, drift-proof gate for the root publish; `releases_created`
    # (plural) is the "any package released" boolean and is NOT used here.
    outputs:
      root_release_created: ${{ steps.release.outputs.release_created }}
      root_tag_name: ${{ steps.release.outputs.tag_name }}
      launcher_release_created: ${{ steps.release.outputs['create-mandrel--release_created'] }}
      launcher_tag_name: ${{ steps.release.outputs['create-mandrel--tag_name'] }}
    steps:
      # Pinned to an exact release tag rather than a floating major (`@v5`)
      # or the moving `@main` ref — a third-party action's default branch
      # is a supply-chain risk vector (CWE-1357). Bump deliberately when a
      # new release-please-action ships; `npm run audit-security` flags
      # any reversion to `@main` / `@master`.
      #
      # Token preference: RELEASE_PLEASE_TOKEN (operator-managed PAT or
      # GitHub App installation token) first, default GITHUB_TOKEN as
      # fallback. The default GITHUB_TOKEN deliberately does NOT trigger
      # downstream workflows on PRs it opens (GitHub's anti-recursion
      # safeguard), so release PRs opened under it never run the required
      # `Validate and Test` check and cannot satisfy branch protection on
      # `main`. A user-scoped PAT (or App token) acts like a real user,
      # so workflows fire normally and auto-merge can clear the gate
      # without operator intervention. Create the PAT once (fine-scoped
      # to this repo with `contents: write` + `pull-requests: write` +
      # `workflows: write`) and store as the `RELEASE_PLEASE_TOKEN`
      # repository secret.
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  npm-publish:
    # Publish the root `mandrel` package to the npm registry with
    # build provenance once release-please cuts a release for the **root**
    # package. This replaces the retired `dist` branch mirror: consumers now
    # install a versioned, provenance-signed package from npm instead of
    # pinning a Git submodule to the `dist` branch. `id-token: write` lets
    # npm attach a signed provenance statement (Sigstore) proving the tarball
    # was built from this repo's CI run; `package.json#publishConfig.provenance`
    # opts the publish in. Auth uses the `NPM_TOKEN` automation token rather
    # than OIDC token exchange so the publish works against the public registry
    # without additional trusted-publisher configuration.
    #
    # Gated on the **root** component's per-path release output (not the
    # top-level `release_created`) so a launcher-only release never re-runs
    # this publish on an already-published root version.
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-launcher:
    # Publish the `create-mandrel` cold-start launcher to the npm registry
    # once release-please cuts a release for the **create-mandrel** package.
    # `npx create-mandrel` is the advertised cold-start entry point; without
    # this step the launcher was never published under any name, so the
    # documented cold start failed for every user (Story #3891, review
    # Finding A.1). The name is kept unscoped (`create-mandrel`) to preserve
    # the `npm create mandrel` / `npx create-mandrel` convention the docs
    # advertise.
    #
    # Gated on the **launcher** component's per-path release output so a
    # root-only release does not attempt to republish the launcher version,
    # and a launcher-only release publishes the launcher without touching the
    # root publish job above. `working-directory: create-mandrel` scopes the
    # publish to the launcher package manifest; provenance + public access
    # come from the launcher's `package.json#publishConfig`, and `NPM_TOKEN`
    # auth mirrors the root publish job. No `npm ci` runs because the launcher
    # has zero dependencies and no build/prepublish scripts.
    name: Publish create-mandrel to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.launcher_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Publish launcher package
        run: npm publish
        working-directory: create-mandrel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
