name: Release Please

# Action pinning (Story #3399): third-party `uses:` refs are pinned to full
# 40-char commit SHAs with a `# vX.Y.Z` comment. First-party `actions/*`
# remain on major-version tags (`@v4`) — see ci.yml header for rationale.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    # Single-package (manifest) output naming — verified against
    # release-please-action v5.0.0 `src/index.ts#setPathOutput`:
    #
    #   if (path === '.') core.setOutput(key, value)           // root: UN-prefixed
    #   else              core.setOutput(`${path}--${key}`, …)  // non-root: prefixed
    #
    # The root `mandrel` package has manifest path `.`, so its outputs are the
    # **un-prefixed** `release_created` / `tag_name`. There is no
    # `.--release_created` output — keying off it (as the initial Story #3891
    # wiring did) silently skips the root publish on every release. The
    # singular `release_created` is set when the root path releases, so it is
    # the correct, drift-proof gate for the root publish; `releases_created`
    # (plural) is the "any package released" boolean and is NOT used here.
    outputs:
      root_release_created: ${{ steps.release.outputs.release_created }}
      root_tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Pinned to an exact release tag rather than a floating major (`@v5`)
      # or the moving `@main` ref — a third-party action's default branch
      # is a supply-chain risk vector (CWE-1357). Bump deliberately when a
      # new release-please-action ships; the `Action Pinning Guard` step in
      # ci.yml (.agents/scripts/check-action-pinning.js) scans every
      # workflow — including this one — and fails the build on any reversion
      # to `@main` / `@master` / a floating tag.
      #
      # Token preference: RELEASE_PLEASE_TOKEN (operator-managed PAT or
      # GitHub App installation token) first, default GITHUB_TOKEN as
      # fallback. The default GITHUB_TOKEN deliberately does NOT trigger
      # downstream workflows on PRs it opens (GitHub's anti-recursion
      # safeguard), so release PRs opened under it never run the required
      # `Validate and Test` check and cannot satisfy branch protection on
      # `main`. A user-scoped PAT (or App token) acts like a real user,
      # so workflows fire normally and auto-merge can clear the gate
      # without operator intervention. Create the PAT once (fine-scoped
      # to this repo with `contents: write` + `pull-requests: write` +
      # `workflows: write`) and store as the `RELEASE_PLEASE_TOKEN`
      # repository secret.
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  npm-publish:
    # Publish the root `mandrel` package to the npm registry with
    # build provenance once release-please cuts a release for the **root**
    # package. This replaces the retired `dist` branch mirror: consumers now
    # install a versioned, provenance-signed package from npm instead of
    # pinning a Git submodule to the `dist` branch. `id-token: write` lets
    # npm exchange the GitHub Actions OIDC token for short-lived publish
    # credentials via npm Trusted Publishing — no stored `NPM_TOKEN`, no
    # rotation, no 2FA-bypass concern — and the same token mints the signed
    # provenance statement (Sigstore) that `package.json#publishConfig.provenance`
    # opts into. Trusted Publishing requires npm CLI >=11.5.1; `.nvmrc` pins
    # Node 22 (bundled npm 10.x), so the workflow explicitly upgrades npm
    # before publishing.
    #
    # Gated on the root component's release output so the publish runs only
    # when release-please cuts a new root release.
    # Normally gated on the root release-please cut. Also runs on a manual
    # `workflow_dispatch` so a **stuck release** — one release-please already
    # tagged/released but whose npm publish failed (e.g. the npm 12.0.0
    # provenance regression above) — can be re-published without waiting for a
    # new version to be cut. This is safe: the npm registry rejects
    # re-publishing an already-present version, so a dispatch can only fill the
    # gap (publish the current `package.json` version if, and only if, it is
    # missing on npm), never clobber an existing one.
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      # Pinned, not `npm@latest` (Story #3399 supply-chain policy applied to
      # the toolchain, not just `uses:` refs). The floating `@latest` bit us
      # when npm 12.0.0 shipped: its in-place global self-upgrade leaves the
      # freshly-replaced global npm tree unable to resolve the bundled
      # `sigstore` module from `libnpmpublish/lib/provenance.js`, so
      # `npm publish` (provenance on) dies with `Cannot find module
      # 'sigstore'` — with zero change on our side. Pin to the last known-good
      # npm 11 line (>=11.5.1 required for Trusted Publishing) and bump
      # deliberately once a 12.x self-upgrade is verified clean.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.18.0

      - name: Publish package
        run: npm publish

  update-loc-baseline:
    # After a root release is cut, append the released version's row to
    # baselines/agents-loc.csv so the `.agents/` payload-size tracker stays
    # current with every release automatically — no manual
    # `npm run baseline:agents-loc`. The generator upserts `package.json`'s
    # version (now the freshly released one) measured at HEAD.
    #
    # Lands the row via an auto-merged PR rather than a direct push to `main`:
    # `main` is branch-protected, and a CSV-only change trivially clears the
    # required checks. The PR is opened with RELEASE_PLEASE_TOKEN (not the
    # default GITHUB_TOKEN) for the same reason the release PR is — a
    # GITHUB_TOKEN-authored PR does not trigger the `Validate and Test` /
    # `baselines` checks, so auto-merge could never satisfy branch protection.
    name: Update .agents LOC baseline
    needs: release-please
    if: ${{ needs.release-please.outputs.root_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Regenerate LOC baseline for the released version
        run: node baselines/agents-loc-baseline.mjs

      - name: Open auto-merged PR if the baseline changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- baselines/agents-loc.csv; then
            echo "No baseline change for ${{ needs.release-please.outputs.root_tag_name }}; nothing to record."
            exit 0
          fi
          TAG="${{ needs.release-please.outputs.root_tag_name }}"
          BRANCH="chore/loc-baseline-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add baselines/agents-loc.csv
          git commit -m "chore(baselines): record .agents loc/bytes for ${TAG}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "chore(baselines): record .agents loc/bytes for ${TAG}" \
            --body "Automated by the release workflow: appends the \`${TAG}\` row to \`baselines/agents-loc.csv\` (the \`.agents/\` payload LOC/bytes tracker), generated by \`baselines/agents-loc-baseline.mjs\`.")
          gh pr merge --auto --squash "$PR_URL"
